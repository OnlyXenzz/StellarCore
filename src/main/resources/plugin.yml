name: StellarCore
version: 1.0.0
main: com.stellar.stellarcore.StellarCore
api-version: 1.20
description: В§6В§КҹкңұбҙӣбҙҮКҹКҹбҙҖКҖбҙ„бҙҸКҖбҙҮ В§7- бҙҮбҙ„бҙҸЙҙбҙҸбҙҚКҸ бҙҳКҹбҙңЙўЙӘЙҙ
author: StellarProject

commands:
  sc:
    aliases: [stellar, s]
    description: В§бҙҖбҙҚбҙҖЙӘЙҙ кңұбҙӣбҙҮКҹКҹбҙҖКҖбҙ„бҙҸКҖбҙҮ бҙ„бҙҸбҙҚбҙҚбҙҖЙҙбҙ…
  balance:
    aliases: [bal, money]
    description: В§бҙҖбҙ„КңбҙҮбҙ„бҙӢ КҸбҙҸбҙңКҖ КҷбҙҖКҹбҙҖЙҙбҙ„бҙҮ
  pay:
    description: В§бҙҖкңұбҙҮЙҙбҙ… бҙҚбҙҸЙҙбҙҮКҸ бҙӣбҙҸ бҙҖЙҙбҙҸбҙӣКңбҙҮКҖ бҙҳКҹбҙҖКҸбҙҮКҖ
  top:
    aliases: [baltop, richest]
    description: В§бҙҖбҙ ЙӘбҙҮбҙЎ КҖЙӘбҙ„КңбҙҮкңұбҙӣ бҙҳКҹбҙҖКҸбҙҮКҖкңұ
  daily:
    aliases: [dailyreward, claim]
    description: В§бҙҖбҙ„КҹбҙҖЙӘбҙҚ бҙ…бҙҖЙӘКҹКҸ КҖбҙҮбҙЎбҙҖКҖбҙ…
  stellaradmin:
    aliases: [sadmin]
    description: В§бҙ„бҙҖбҙ…бҙҚЙӘЙҙ бҙ„бҙҸбҙҚбҙҚбҙҖЙҙбҙ…кңұ
    permission: stellar.admin
  shop:
    aliases: [stellarshop]
    description: В§бҙҖбҙҸбҙҳбҙҮЙҙ кңұКңбҙҸбҙҳ

permissions:
  stellar.admin:
    description: бҙҖбҙ…бҙҚЙӘЙҙ бҙҖбҙ„бҙ„бҙҮкңұкңұ
    default: op
